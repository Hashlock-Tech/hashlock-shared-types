name: Publish to npm

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write   # Required for npm provenance

jobs:
  publish:
    name: Publish @hashlock-tech/shared-types
    runs-on: ubuntu-latest
    environment: npm-publish  # Manual approval gate; NPM_TOKEN lives here
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: 9.15.0

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      # Verify tag matches package.json version — refuse otherwise.
      - name: Verify tag == package.json version
        run: |
          TAG="${GITHUB_REF##*/v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "Tag v$TAG does not match package.json $PKG"
            exit 1
          fi
          echo "Tag and package version match: $PKG"

      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance
